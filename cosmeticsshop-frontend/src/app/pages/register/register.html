<section class="auth-page">
  <form class="auth-card auth-card--wide" #registerForm="ngForm" (ngSubmit)="register(registerForm)" novalidate>
    <p class="auth-card__eyebrow">New account</p>
    <h1>Create Account</h1>
    <p class="auth-card__text">Join Luime as a shopper or seller.</p>

    <div class="auth-grid">
      <label class="auth-field">
        <span>First name</span>
        <input [(ngModel)]="registration.firstName" name="firstName" required />
      </label>

      <label class="auth-field">
        <span>Last name</span>
        <input [(ngModel)]="registration.lastName" name="lastName" required />
      </label>
    </div>

    <label class="auth-field">
      <span>Email</span>
      <input [(ngModel)]="registration.email" name="email" type="email" required email />
    </label>

    <div class="auth-grid">
      <label class="auth-field">
        <span>Password</span>
        <input [(ngModel)]="registration.password" name="password" type="password" minlength="6" required />
      </label>

      <label class="auth-field">
        <span>Account type</span>
        <select [(ngModel)]="registration.accountType" name="accountType">
          <option value="SHOPPER">Shopper</option>
          <option value="SELLER">Seller</option>
        </select>
      </label>
    </div>

    <div class="auth-grid">
      <label class="auth-field">
        <span>City</span>
        <input [(ngModel)]="registration.city" name="city" />
      </label>

      <label class="auth-field">
        <span>Membership</span>
        <select [(ngModel)]="registration.membershipType" name="membershipType">
          <option value="BRONZE">Bronze</option>
          <option value="SILVER">Silver</option>
          <option value="GOLD">Gold</option>
        </select>
      </label>
    </div>

    <button type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Creating account...' : 'Create account' }}
    </button>

    @if (errorMessage()) {
      <p class="auth-message auth-message--error">{{ errorMessage() }}</p>
    }

    <a routerLink="/login">Already have an account? Login</a>
  </form>
</section>
